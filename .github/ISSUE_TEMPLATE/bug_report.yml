name: Bug Report
description: Report a bug in MikoPBX
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below to help us fix it.

  - type: input
    id: version
    attributes:
      label: MikoPBX Version
      description: Which version of MikoPBX are you running?
      placeholder: "e.g. 2024.1.114"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How is MikoPBX deployed?
      options:
        - ISO / Virtual Machine
        - Docker
        - LXC Container (Proxmox)
        - Cloud (AWS, GCP, Azure, etc.)
        - Bare Metal
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - x86_64
        - ARM64
        - Not sure

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: |
        Paste any relevant logs from System Diagnostic or SSH.
        Logs can be downloaded from the web interface: Maintenance → System Diagnostic.
      render: text

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (browser, phone model, SIP provider, etc.)
