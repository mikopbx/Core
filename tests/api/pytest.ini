[pytest]
# MikoPBX REST API v3 Test Suite Configuration
# This defines test execution order matching phpunit.xml structure

# Test execution order (files run alphabetically, so we use test_NN_ prefix)
# Based on /Users/nb/PhpstormProjects/mikopbx/Core/tests/AdminCabinet/phpunit.xml

testpaths = .

python_files = test_*.py

python_classes = Test*

python_functions = test_*

# Console output options
console_output_style = progress
addopts =
    -v
    --tb=short
    --strict-markers
    -ra

# Markers for test categorization
markers =
    smoke: Quick smoke tests (< 5 seconds)
    auth: Authentication tests
    telephony: Core telephony features (extensions, employees, providers)
    routing: Call routing features (queues, IVR, routes)
    settings: System settings and configuration
    security: Security features (firewall, fail2ban)
    files: File upload and media tests
    utility: Utility endpoints (openapi, passwords, logs)
    destructive: Tests that delete data (require ENABLE_SYSTEM_RESET=1)
    slow: Tests that take > 10 seconds
    session5: Tests added in Session 5
    dependency: Test execution dependencies

# Timeout for tests (prevent hanging)
timeout = 300

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Coverage options (if pytest-cov is installed)
# Uncomment to generate coverage reports
# --cov=.
# --cov-report=html
# --cov-report=term-missing

# Log level
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test discovery
norecursedirs =
    .git
    .pytest_cache
    __pycache__
    *.egg-info
    .venv
    venv
    dist
    build
    backup_before_rename
    schemathesis
    setup
