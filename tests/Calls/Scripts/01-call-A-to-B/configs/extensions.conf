[globals] 
[general]
[sipregistrations]

#include orgn-wait-common.conf

[out-to-exten]
exten => _X!,1,Wait(1)
	same => n,Dial(PJSIP/${EXTEN}@${A_NUM},,Tt)
	same => n,Hangup()

[incoming]
exten => _X!,1,Wait(2)
    same => n,Answer()
    same => n,Set(TIMEOUT(absolute)=5)
    same => n,SayDigits(${EXTEN})
    same => n,Milliwatt()