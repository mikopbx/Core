; Common origination context for call tests.
; Sets global variables and plays Milliwatt tone as source audio.
; Include this file in test-specific extensions.conf: #include orgn-wait-common.conf

[orgn-wait]
exten => _X!,1,NoOp(start test)
    same => n,Answer()
    same => n,Set(GLOBAL(A_NUM)=${A_NUM})
    same => n,Set(GLOBAL(B_NUM)=${B_NUM})
    same => n,Set(GLOBAL(C_NUM)=${C_NUM})
    same => n,Set(GLOBAL(OFF_NUM)=${OFF_NUM})
    same => n,Set(TIMEOUT(absolute)=20)
    same => n,Milliwatt()
