# MikoPBX Sound Files API Configuration
# Handles MOH, IVR, and system sound files playback
# For call recordings, use cdr-api.conf configuration

location /pbxcore/api/v2/sound-files/playback {
    # Optional session check - can be disabled for public sound files
    # Set to '1' to require authentication for private sound files
    set $session_check_required '0';
    
    # Security check is handled by unified-security.lua from main config
    # when session_check_required is set to '1'

    root /storage/usbdisk1/mikopbx;

    # Extract download and filename parameters
    set_by_lua $download '
        if (ngx.var.arg_download) then
            return ngx.var.arg_download;
        end
        return 0;
    ';
    
    set_by_lua $filename '
        if (ngx.var.arg_filename) then
            return ngx.var.arg_filename;
        end
        local path = ngx.unescape_uri(ngx.var.arg_view):reverse();
        return string.sub(path, 0, string.find(path,"/") - 1):reverse();
    ';

    # Build the actual file path for Nginx to serve
    set_by_lua $result_url '
        local path = ngx.unescape_uri(ngx.var.arg_view);
        return "/pbxcore/api/v2/sound-files/getFile"..string.gsub(path,ngx.var.document_root,"");
    ';
    
    try_files "$result_url" "$result_url";
}

# Internal location for actual file serving
location ^~/pbxcore/api/v2/sound-files/getFile {
    # Internal location - only accessible via internal redirect
    internal;
    
    # No session check here - already done in the main location
    alias /storage/usbdisk1/mikopbx;
    
    # Add download headers if requested
    if ( $download = '1' ) {
        add_header Content-disposition "attachment; filename=$filename";
    }
    
    # Enable byte range support for audio streaming
    add_header Accept-Ranges bytes;
    
    # Cache control for better performance with MOH files
    expires 1h;
    add_header Cache-Control "public, immutable";
    
    # Security headers
    add_header X-Content-Type-Options "nosniff";
}