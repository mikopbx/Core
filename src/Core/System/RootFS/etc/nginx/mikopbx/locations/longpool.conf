location = /pbxcore/api/nchan/auth {
    # The authentication check will always fail, and a notification will be written to syslog.
    default_type 'text/plain';
    content_by_lua_file /etc/nginx/mikopbx/lua/fail-auth.lua;
    keepalive_timeout 0;
}

# Internal JWT validation endpoint for Lua scripts (ngx.location.capture)
# MUST be a custom location because ngx.location.capture requires explicit nginx locations
#
# Security notes:
# - 'internal' directive prevents external HTTP access (returns 404)
# - REMOTE_ADDR=127.0.0.1 makes isLocalHostRequest() return true in AuthenticationMiddleware
# - NO need for PUBLIC_ENDPOINTS list - localhost requests always pass authentication
location = /pbxcore/api/v3/auth:validateToken {
    internal;  # Only accessible via ngx.location.capture, not from external requests

    fastcgi_pass unix:/var/run/php-fpm.sock;
    fastcgi_index index.php;
    include fastcgi_params;

    fastcgi_param SCRIPT_FILENAME /usr/www/sites/pbxcore/index.php;
    fastcgi_param REQUEST_URI /pbxcore/index.php?_url=/api/v3/auth:validateToken&$query_string;
    fastcgi_param QUERY_STRING _url=/api/v3/auth:validateToken&$query_string;

    # Override REMOTE_ADDR to localhost so isLocalHostRequest() returns true
    # This bypasses authentication checks in AuthenticationMiddleware
    fastcgi_param REMOTE_ADDR 127.0.0.1;
}

location ~ /pbxcore/api/nchan/sub/(.*)$ {
    nchan_subscriber;
    nchan_channel_id "$1";
    nchan_channel_id_split_delimiter ",";
    nchan_subscriber_first_message newest;
 
    more_clear_headers 'Access-Control-Allow-Credentials';
    add_header 'X-Access-Control-Allow-Origin' '*';
    more_clear_headers 'Server';

    access_by_lua_file /etc/nginx/mikopbx/lua/access-nchan.lua;
}

location ~ /pbxcore/api/nchan/pub/(.*)$ {
    nchan_publisher;
    allow  127.0.0.1;
    deny all;
    nchan_channel_id "$1";
    nchan_message_buffer_length 50;
    nchan_message_timeout 10s;
}