location /pbxcore/api/cdr/v2/playback {
    # Enable session check for CDR endpoints
    set $session_check_required '1';

    # Already handled by unified-security.lua from main config

    root /storage/usbdisk1/mikopbx;

    set_by_lua $download '
        if (ngx.var.arg_download) then
            return ngx.var.arg_download;
        end
        return 0;
    ';
    set_by_lua $filename '
        if (ngx.var.arg_filename) then
            return ngx.var.arg_filename;
        end
        local path = ngx.unescape_uri(ngx.var.arg_view):reverse();
        return string.sub(path, 0, string.find(path,"/") - 1):reverse();
    ';

    set_by_lua $result_url '
        local path = ngx.unescape_uri(ngx.var.arg_view);

        -- Block path traversal
        if not path or string.find(path, "%.%.") then
            ngx.log(ngx.WARN, "Path traversal blocked in CDR playback from: ", ngx.var.remote_addr)
            return "/404"
        end

        -- Whitelist: only allow access to recordings, logs, and media files
        local allowed_prefixes = {
            "/storage/usbdisk1/mikopbx/astspool/",
            "/storage/usbdisk1/mikopbx/astlogs/",
            "/storage/usbdisk1/mikopbx/media/",
        }
        local is_allowed = false
        for _, prefix in ipairs(allowed_prefixes) do
            if string.sub(path, 1, #prefix) == prefix then
                is_allowed = true
                break
            end
        end

        if not is_allowed then
            ngx.log(ngx.WARN, "CDR playback access denied to path: ", path, " from: ", ngx.var.remote_addr)
            return "/404"
        end

        -- Only allow audio/video media files — block database, config, log files
        local blocked_extensions = { "%.db$", "%.db%-journal$", "%.sqlite$", "%.conf$", "%.log$", "%.gz$", "%.zip$", "%.tar$", "%.key$", "%.pem$", "%.crt$" }
        for _, ext in ipairs(blocked_extensions) do
            if string.find(path:lower(), ext) then
                ngx.log(ngx.WARN, "CDR playback blocked non-media file: ", path, " from: ", ngx.var.remote_addr)
                return "/404"
            end
        end

        return "/pbxcore/api/cdr/v2/getRecordFile"..string.gsub(path,ngx.var.document_root,"");
    ';
    try_files "$result_url" "$result_url";
}

location ^~/pbxcore/api/cdr/v2/getRecordFile  {
    # Enable session check for CDR endpoints
    set $session_check_required '1';

    # Already handled by unified-security.lua from main config

    alias /storage/usbdisk1/mikopbx;
    include mikopbx/security-headers.conf;
    if ( $download = '1' ) {
        add_header Content-disposition "attachment; filename=$filename";
        include mikopbx/security-headers.conf;
    }
}
