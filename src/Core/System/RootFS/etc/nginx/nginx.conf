user www www;
worker_processes  2;
pid /var/run/nginx.pid;
  #
events {
    worker_connections  1024;
}

http {
    include       mime.types;
    sendfile        on;
    keepalive_timeout  65;

    # Hide nginx version and Server header from responses
    server_tokens off;
    more_clear_headers Server;

    # Increase hash sizes for lua variables
    variables_hash_max_size 2048;
    variables_hash_bucket_size 128;

	  lua_shared_dict asterisk_vars 20m;

    # Define the shared dictionary for caching
    lua_shared_dict access_cache 1m;
    
    # Define shared dictionaries for IP filtering
    lua_shared_dict blocked_ips 10m;
    lua_shared_dict firewall_state 1m;
    
    # Define shared dictionary for rate limiting
    lua_shared_dict rate_limit 10m;

    # Configure logging for fail2ban with ISO 8601 timestamp format
    log_format fail2ban '$remote_addr - $remote_user [$time_iso8601] '
                        '"$request" $status $body_bytes_sent '
                        '"$http_referer" "$http_user_agent" '
                        'upstream_status $upstream_status';

    access_log /var/log/nginx_access.log fail2ban;
    error_log /var/log/nginx_error.log;

  	# Content compression parameters
  	gzip				on;
  	gzip_proxied		any;
  	gzip_http_version	1.0;
    gzip_types text/plain text/css application/json application/x-javascript text/xml application/xml text/javascript application/javascript;

    charset utf-8;
    client_max_body_size 100G;
    fastcgi_read_timeout 1800;

    # locations files
    include mikopbx/conf.d/*.conf;

    # module server blocks
    include mikopbx/modules_servers/*.conf;
}
